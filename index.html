<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi Dokumen - SD ISLAM IQRA PETOBO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #ffffff; font-family: Arial, sans-serif; margin: 0; padding: 0; }
        
        /* Header Abu-abu khas UT */
        .header-ut {
            background-color: #e9ecef;
            padding: 40px 20px;
            text-align: center;
            border-bottom: 1px solid #dee2e6;
        }
        .header-ut img { width: 100px; margin-bottom: 15px; }
        .header-ut h1 { 
            font-size: 2.2rem; 
            font-weight: 500; 
            color: #333; 
            letter-spacing: 1px;
            margin: 0;
        }

        /* Styling Tabel */
        .content-container { padding: 40px 0; }
        .table { margin-bottom: 0; border-top: 1px solid #dee2e6; }
        .table tr { border-bottom: 1px solid #dee2e6; }
        .table th { 
            background-color: #ffffff; 
            width: 30%; 
            padding: 15px 20px; 
            font-weight: normal; 
            color: #555;
            border: none;
        }
        .table td { 
            padding: 15px 20px; 
            border: none;
            color: #000;
        }
        .separator { width: 10px; padding-right: 0 !important; text-align: center; }

        #loader { text-align: center; padding: 50px; color: #666; }
    </style>
</head>
<body>

<div class="header-ut">
    <img src="https://raw.githubusercontent.com/PetoDevIqra/petodeviqra.github.io/refs/heads/main/img/LOGO-NEW.png" alt="Logo">
    <h1>DATA SURAT KETERANGAN</h1>
</div>

<div class="container content-container">
    <div class="row justify-content-center">
        <div class="col-md-11">
            <div id="loader">Memuat data...</div>

            <div id="result-table" style="display: none;">
                <table class="table">
                    <tbody id="data-rows">
                        </tbody>
                </table>
            </div>

            <div id="error-message" class="alert alert-danger text-center" style="display: none;">
                Data surat tidak ditemukan dalam sistem kami.
            </div>
        </div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const idSurat = urlParams.get('id');
    const apiURL = "https://script.google.com/macros/s/AKfycbzgAkLkrK6P7730ol5SZLh4agp9JhWdg9VweTuA5GbVqA8L2-mIr53NM92FdfDA2jEv/exec"; 

    if (idSurat) {
        fetch(apiURL + "?id=" + encodeURIComponent(idSurat))
        .then(res => res.json())
        .then(data => {
            document.getElementById('loader').style.display = 'none';
            if (data) {
                const rows = `
                    <tr><th>Nomor Surat</th><td class="separator">:</td><td>${data.nomor}</td></tr>
                    <tr><th>Tanggal Surat</th><td class="separator">:</td><td>${data.tanggal}</td></tr>
                    <tr><th>Perihal Surat</th><td class="separator">:</td><td>${data.perihal}</td></tr>
                    <tr><th>Tujuan Surat</th><td class="separator">:</td><td>${data.tujuan}</td></tr>
                    <tr><th>Penanggung Jawab</th><td class="separator">:</td><td>${data.pj}</td></tr>
                    <tr><th>Keterangan</th><td class="separator">:</td><td>${data.ket}</td></tr>
                    <tr style="background-color: #fdfdfe;">
                        <th>Database ID</th>
                        <td class="separator">:</td>
                        <td style="font-family: monospace; font-size: 0.85rem; color: #666;">${data.sheetId}</td>
                    </tr>
                `;
                document.getElementById('result-rows').innerHTML = rows;
                document.getElementById('content').style.display = 'block';
            } else {
                document.getElementById('error').style.display = 'block';
            }
        })
    }
</script>

</body>
</html>
