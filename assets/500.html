<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Sedang Bersiap | 500 Error</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Animasi berkedip lembut untuk efek loading/mesin */
        @keyframes pulse-slow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .pulse-gear {
            animation: pulse-slow 2s infinite ease-in-out;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex items-center justify-center p-6 font-sans">

    <div class="max-w-md w-full text-center space-y-8 bg-slate-900/50 p-8 rounded-2xl border border-slate-800 backdrop-blur-sm shadow-xl">
        
        <div class="flex justify-center">
            <div class="relative w-24 h-24 bg-amber-500/10 rounded-full flex items-center justify-center text-amber-500 border border-amber-500/20 pulse-gear">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-12 h-12">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5.25 14.25h13.5m-13.5 0a3 3 0 0 1-3-3V3.75a3 3 0 0 1 3-3h13.5a3 3 0 0 1 3 3v7.5a3 3 0 0 1-3 3m-13.5 0V21a2.25 2.25 0 0 0 2.25 2.25h9a2.25 2.25 0 0 0 2.25-2.25v-6.75m-12 0h12" />
                </svg>
                <span class="absolute top-2 right-2 flex h-3 w-3">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-amber-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-amber-500"></span>
                </span>
            </div>
        </div>

        <div class="space-y-3">
            <h1 class="text-4xl font-extrabold tracking-tight text-white">500</h1>
            <h2 class="text-xl font-semibold text-slate-300">Server Belum Aktif</h2>
            <p class="text-sm text-slate-400 leading-relaxed">
                Sistem kami sedang melakukan *startup* atau pemeliharaan rutin. Mesin sedang dipanaskan, mohon tunggu beberapa saat lagi.
            </p>
        </div>

        <div class="w-full bg-slate-800 rounded-full h-1.5 overflow-hidden">
            <div class="bg-amber-500 h-1.5 rounded-full animate-[pulse-slow_1.5s_infinite]" style="width: 70%"></div>
        </div>

        <div class="pt-2">
            <button onclick="window.location.reload();" class="inline-flex items-center justify-center px-5 py-2.5 text-sm font-medium text-slate-950 bg-amber-400 hover:bg-amber-300 transition-colors duration-200 rounded-lg font-semibold shadow-lg shadow-amber-500/10 cursor-pointer">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 mr-2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
                </svg>
                Coba Muat Ulang
            </button>
        </div>

        <p class="text-xs text-slate-600">
            Jika error ini menetap dalam beberapa menit, silakan hubungi tim IT.
        </p>
    </div>

</body>
</html>
